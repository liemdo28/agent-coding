name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: root repo — build, lint, smoke tests ──────────────────────────
  root:
    name: Root — Build / Lint / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # better-sqlite3 needs these if it must compile from source
      - name: Install native-build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Build check (syntax-verify all entry points)
        run: npm run build

      - name: Lint (syntax-check all JS source)
        run: npm run lint

      - name: Unit + smoke tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Create required runtime directories
        run: mkdir -p .local-agent/engineering-log/architecture

      - name: Quality gate
        run: node local-agent/testing/test-runner.js --check-quality .

  # ── Job 2: accounting-engine — all 167 tests ─────────────────────────────
  accounting-engine:
    name: Accounting Engine — 167 Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: accounting-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: accounting-engine/package-lock.json

      # better-sqlite3 native build fallback
      - name: Install native-build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Run all 167 tests (unit + integration + security + stress)
        run: npm test
        timeout-minutes: 5
