<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting Engine Dashboard</title>
  <style>
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; margin: 0; padding: 24px; }
    h1   { color: #58a6ff; margin: 0 0 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card h2 { color: #8b949e; font-size: 12px; text-transform: uppercase; margin: 0 0 12px; }
    .stat { font-size: 28px; color: #58a6ff; font-weight: bold; }
    .label { font-size: 11px; color: #6e7681; margin-top: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge.ok  { background: #1f4829; color: #3fb950; }
    .badge.err { background: #4d1a1a; color: #f85149; }
    pre  { font-size: 11px; color: #8b949e; overflow: auto; max-height: 200px; }
    button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px;
             border-radius: 6px; cursor: pointer; font-family: monospace; }
    button:hover { background: #30363d; }
    #status { margin-bottom: 16px; font-size: 12px; color: #6e7681; }
  </style>
</head>
<body>
  <h1>Accounting Engine</h1>
  <div id="status">Connecting to http://127.0.0.1:8844…</div>
  <div style="margin-bottom:16px">
    <button onclick="refresh()">Refresh</button>
    <button onclick="verifyLedger()">Verify Ledger</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    const BASE = 'http://127.0.0.1:8844';

    async function fetchJSON(path) {
      const r = await fetch(BASE + path);
      return r.json();
    }

    function card(title, content) {
      return `<div class="card"><h2>${title}</h2>${content}</div>`;
    }

    function statBlock(value, label) {
      return `<div class="stat">${value}</div><div class="label">${label}</div>`;
    }

    async function refresh() {
      document.getElementById('status').textContent = 'Loading…';
      try {
        const stats = await fetchJSON('/stats');
        const db    = stats.database ?? {};
        const qa    = stats.qa      ?? {};
        const pt    = stats.patches ?? {};
        const mt    = stats.metrics ?? {};

        const cards = [
          card('Database', [
            statBlock(db.sessions?.toLocaleString()   ?? '–', 'Sessions'),
            statBlock(db.metrics?.toLocaleString()    ?? '–', 'Metric Rows'),
            statBlock(db.patches?.toLocaleString()    ?? '–', 'Patches'),
            statBlock(db.qaRuns?.toLocaleString()     ?? '–', 'QA Runs'),
            statBlock(db.auditRows?.toLocaleString()  ?? '–', 'Audit Events'),
            `<div class="label" style="margin-top:8px">DB Size: ${((db.dbSizeBytes??0)/1048576).toFixed(2)} MB | WAL: ${db.walMode??'–'}</div>`,
          ].join('')),

          card('QA Stats', [
            statBlock(qa.total_runs ?? '–', 'Total Runs'),
            statBlock((qa.avg_score ?? 0).toFixed(1), 'Avg Score'),
            statBlock(qa.pass_count ?? '–', 'Pass'),
            statBlock(qa.fail_count ?? '–', 'Fail'),
          ].join('')),

          card('Patches', [
            statBlock(pt.total ?? '–', 'Total'),
            statBlock(pt.applied ?? '–', 'Applied'),
            statBlock(pt.rolled_back ?? '–', 'Rolled Back'),
            statBlock(pt.rejected ?? '–', 'Rejected'),
          ].join('')),

          card('Resource Metrics', [
            statBlock(mt.total_samples?.toLocaleString() ?? '–', 'Samples'),
            statBlock((mt.avg_cpu_pct ?? 0).toFixed(2) + '%', 'Avg CPU'),
            statBlock((mt.avg_memory_mb ?? 0).toFixed(1) + ' MB', 'Avg Memory'),
            `<div class="label" style="margin-top:8px">Last: ${mt.last_sample ?? '–'}</div>`,
          ].join('')),
        ];

        document.getElementById('grid').innerHTML = cards.join('');
        document.getElementById('status').textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e.message + ' — is the API running on 127.0.0.1:8844?';
      }
    }

    async function verifyLedger() {
      try {
        const result = await fetchJSON('/stats/ledger');
        const badge  = result.valid
          ? `<span class="badge ok">VALID</span>`
          : `<span class="badge err">TAMPERED</span>`;
        const extra  = document.createElement('div');
        extra.className = 'card';
        extra.innerHTML = `<h2>Ledger Verification ${badge}</h2><pre>${JSON.stringify(result, null, 2)}</pre>`;
        document.getElementById('grid').prepend(extra);
      } catch (e) {
        alert('Ledger verify failed: ' + e.message);
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
