<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline Digital Twin</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; background: #0d1117; color: #e6edf3; overflow: hidden; }
      .stage { min-height: 100vh; display: grid; place-items: center; background:
        radial-gradient(circle at 20% 20%, rgba(88,166,255,0.18), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(63,185,80,0.14), transparent 24%),
        linear-gradient(135deg, #0d1117, #111827 55%, #0d1117); }
      .grid { width: min(920px, 92vw); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .node { min-height: 70px; border: 1px solid rgba(88,166,255,0.28); border-radius: 8px; padding: 14px; background: rgba(22,27,34,0.74); box-shadow: inset 0 0 32px rgba(88,166,255,0.04); }
      .node strong { display: block; font-size: 13px; margin-bottom: 8px; }
      .node span { display: block; height: 5px; border-radius: 99px; background: linear-gradient(90deg, #3fb950, #d29922, #f85149); }
      .caption { position: fixed; left: 18px; bottom: 14px; color: #8b949e; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="grid">
        <div class="node"><strong>R&D</strong><span></span></div>
        <div class="node"><strong>Manufacturing</strong><span></span></div>
        <div class="node"><strong>IT & AI</strong><span></span></div>
        <div class="node"><strong>Finance</strong><span></span></div>
        <div class="node"><strong>Marketing</strong><span></span></div>
        <div class="node"><strong>Operations</strong><span></span></div>
        <div class="node"><strong>HR</strong><span></span></div>
        <div class="node"><strong>Legal</strong><span></span></div>
      </div>
    </div>
    <div class="caption">Static offline iframe base. React overlay controls predictive SLA and batch simulation above.</div>
  </body>
</html>
